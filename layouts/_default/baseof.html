<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{ if not .IsHome }}{{ partial "h1-title-text.html" . }} - {{ end }}{{ site.Title }}</title>
  <link rel="icon" type="image/svg+xml" href="/favicon.svg">
  <link rel="stylesheet" href="/css/style.css">
  <link rel="stylesheet" href="/css/syntax.css">
  <link rel="stylesheet" href="/pagefind/pagefind-ui.css">
</head>
<body{{ if eq .Section "notes" }} class="notes-page"{{ end }}>
  <header>
    <a href="/" class="site-title">
      <svg class="aperture-logo" viewBox="0 0 532 532" fill="currentColor" xmlns="http://www.w3.org/2000/svg" xmlns:xlink="http://www.w3.org/1999/xlink" aria-hidden="true">
        <g id="a"><g id="b"><path id="c" d="m165 32c-57 24-105 69-131 127l248-46"/><use transform="rotate(45,266,266)" xlink:href="#c"/></g><use transform="rotate(90,266,266)" xlink:href="#b"/></g><use transform="rotate(180,266,266)" xlink:href="#a"/>
      </svg>
      {{ site.Title }}
    </a>
    <nav>
      <a href="/notes"{{ if eq .Section "notes" }} class="active"{{ end }}>
        <span>CSNotes</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4Z"/></svg>
      </a>
      <a href="/posts"{{ if or (eq .Section "posts") .IsHome }} class="active"{{ end }}>
        <span>Posts</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M4 22h16a2 2 0 0 0 2-2V4a2 2 0 0 0-2-2H8a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2z"/><path d="M14 2v4a2 2 0 0 0 2 2h4"/><path d="M10 9H8"/><path d="M16 13H8"/><path d="M16 17H8"/></svg>
      </a>
      <a href="/about"{{ if hasPrefix .RelPermalink "/about" }} class="active"{{ end }}>
        <span>About</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="10"/><path d="M9.09 9a3 3 0 0 1 5.83 1c0 2-3 3-3 3"/><path d="M12 17h.01"/></svg>
      </a>
      <button id="search-toggle" class="search-toggle" aria-label="Search">
        <span>Search</span>
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </button>
    </nav>
  </header>
  <main>
    {{ block "main" . }}{{ end }}
  </main>
  <dialog id="search-modal">
    <div id="search"></div>
  </dialog>
  <script src="/pagefind/pagefind-ui.js"></script>
  <script>
    const modal = document.getElementById('search-modal');
    const toggle = document.getElementById('search-toggle');
    let initialized = false;

    toggle.addEventListener('click', () => {
      if (!initialized && typeof PagefindUI !== 'undefined') {
        new PagefindUI({ element: '#search', showImages: false });
        initialized = true;
      }
      modal.showModal();
      requestAnimationFrame(() => modal.querySelector('input')?.focus());
    });

    modal.addEventListener('click', e => { if (e.target === modal) modal.close(); });

    document.addEventListener('keydown', e => {
      if ((e.ctrlKey || e.metaKey) && e.key === 'k') {
        e.preventDefault();
        toggle.click();
      }
    });
  </script>
  <script>
    const sidebarToggle = document.getElementById('sidebar-toggle');
    const sidebar = document.querySelector('.notes-sidebar');

    if (sidebarToggle && sidebar) {
      const overlay = document.createElement('div');
      overlay.id = 'sidebar-overlay';
      document.body.appendChild(overlay);

      function openSidebar() {
        sidebar.classList.add('open');
        overlay.classList.add('visible');
      }

      function closeSidebar() {
        sidebar.classList.remove('open');
        overlay.classList.remove('visible');
      }

      sidebarToggle.addEventListener('click', () => {
        sidebar.classList.contains('open') ? closeSidebar() : openSidebar();
      });

      overlay.addEventListener('click', closeSidebar);
    }
  </script>
  <footer>
    <div class="contact-links">
      <a href="https://github.com/u2usvc" aria-label="GitHub">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M12 0C5.37 0 0 5.37 0 12c0 5.3 3.438 9.8 8.205 11.387.6.113.82-.258.82-.577v-2.165c-3.338.726-4.042-1.61-4.042-1.61-.546-1.387-1.333-1.756-1.333-1.756-1.089-.745.083-.729.083-.729 1.205.085 1.84 1.237 1.84 1.237 1.07 1.834 2.807 1.304 3.492.997.108-.775.418-1.305.762-1.605-2.665-.3-5.466-1.332-5.466-5.93 0-1.31.468-2.381 1.236-3.221-.124-.303-.535-1.524.117-3.176 0 0 1.008-.322 3.3 1.23a11.5 11.5 0 0 1 3.003-.404c1.02.005 2.047.138 3.003.404 2.29-1.552 3.297-1.23 3.297-1.23.653 1.652.242 2.873.118 3.176.77.84 1.235 1.911 1.235 3.221 0 4.61-2.804 5.628-5.476 5.922.43.372.823 1.102.823 2.222v3.293c0 .322.218.694.825.576C20.565 21.796 24 17.298 24 12c0-6.63-5.37-12-12-12z"/></svg>
      </a>
      <a href="https://twitter.com/u2usvc" aria-label="Twitter">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" aria-hidden="true"><path d="M18.244 2.25h3.308l-7.227 8.26 8.502 11.24H16.17l-4.714-6.231-5.401 6.231H2.748l7.73-8.835L1.254 2.25H8.08l4.253 5.622 5.911-5.622zm-1.161 17.52h1.833L7.084 4.126H5.117z"/></svg>
      </a>
    </div>
  </footer>
</body>
</html>
