<div class="disclaimer-box disclaimer-{{ default "red" (.Get "color") }}">
  <span class="disclaimer-icon">
    <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" width="1.2em" height="1.2em" aria-hidden="true">
      <path d="M12 2L1 21h22L12 2zm0 3.5L20.5 19h-17L12 5.5zM11 10v4h2v-4h-2zm0 6v2h2v-2h-2z"/>
    </svg>
  </span>
  <div class="disclaimer-content">
    {{ with .Get "title" }}<strong>{{ . }}</strong>{{ end }}
    {{ .Inner | markdownify }}
  </div>
</div>
